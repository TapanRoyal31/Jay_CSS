<head>
    <meta charset="UTF-8">

<style>
    body{
        background-color: #212121;
    }

    /* 
        HexaCode :- 0 - 15 bits
        0 - 9 digits
        10 - a
        11 - b
        12 - c
        13 - d
        14 - e
        15 - f
    */

    p{
        color: aqua;
        color: rgb(14, 14, 197); /* #rrggbb */
        color: rgb(223,234 , 0); /* red green and blue 0 - 255*/
        color: rgba(253, 123, 56,0.5); /* alpha */
        color: hsl(145, 50%, 60%); 
        color: #2a52be;
    }
</style>
<body>
    <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Ipsa, quae?</p>
</body>
